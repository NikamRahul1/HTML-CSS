<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Div Practice </title>
  <style>
    .div {
      width: 100px;
      height: 100px;
      background: red;
    }

    .div2 {
      width: 100px;
      height: 100px;
      background: green;
      border-radius: 50px;
    }

    .div3 {
      padding-left: 10px;
      width: 200px;
      height: 100px;
      border: 2px solid black;     
    }

    .div4 {
      width: 300px;
      height: 100px;
      border: 2px solid black;   
      background-color: black;  
    }

    .para-1 {
      color: white;
      padding-left: 10px;
      
    }
    .para {
    font-weight: bold;
    }

  </style>

</head>
<body>
  
  9a : 
  <Div class="div">

  </Div>

  <br><br>

  9b :

  <div class="div2">

  </div>

  <br><br>

  9c : 

  <div class="div3">

    <p>Satisfied with our service?</p>
    <button>Yes</button>
    <button>No</button>

  </div>

  <br><br>

  9d :

  <div class="div4">
    <p class="para-1 para">Install YouTube Music</p>
    <p class="para-1">Add YouTube Music to your desktop for quick and easy access</p>
  </div>

  <br><br>

</body>
</html>
