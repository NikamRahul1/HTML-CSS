<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Div Practice </title>
  <style>
    .div {
      width: 100px;
      height: 100px;
      background: red;
    }

    .div2 {
      width: 100px;
      height: 100px;
      background: green;
      border-radius: 50px;
    }

    .div3 {
      padding-left: 10px;
      width: 200px;
      height: 100px;
      border: 2px solid black;     
    }

    .div4 {
      width: 300px;
      height: 100px;
      border: 2px solid black;   
      background-color: black;  
    }

    .para-1 {
      color: white;
      padding-left: 10px;
      
    }
    .para {
    font-weight: bold;
    }

    .div-e {
      margin-left: 10px;
      width: 450px;
      height: 80px;
      border: 1px solid grey;
      border-radius: 8px;
      box-shadow: 1px 1px 4px grey;
    }

    .div-cat-image {
      vertical-align: middle;
      display: inline-block;
    }

    .img-Oliver {
      width: 60px;
      margin: 10px;
      border-radius: 30px;
    }
    
    .search-bar {
      vertical-align: middle;
      width: 250px;
      padding : 10px;
      border: none;
    }

    .tweet-button {
      background-color: rgb(106, 106, 248);
      color: white;
      padding: 10px;
      width: 80px;
      border-radius: 40px;
      border: none;
    }

    .div-f {
      border: 1px solid grey;
      display: inline-block;
      margin-left: 10px;
    }

    .profile-pic {
      width: 300px;
    }
    
    .profile-title {
      margin: 5px;
      font-weight: bold;
    }

    .mutual-friend {
      margin: 5px;
      color: grey;
    }

    .add-friend {
      background-color: blue;
      padding: 5px;
      margin: 5px;
      color: white;
      border: none;
      border-radius: 5px;
    }

  </style>

</head>
<body>
  
  9a : 
  <Div class="div">

  </Div>

  <br><br>

  9b :

  <div class="div2">

  </div>

  <br><br>

  9c : 

  <div class="div3">

    <p>Satisfied with our service?</p>
    <button>Yes</button>
    <button>No</button>

  </div>

  <br><br>

  9d :

  <div class="div4">
    <p class="para-1 para">Install YouTube Music</p>
    <p class="para-1">Add YouTube Music to your desktop for quick and easy access</p>
  </div>

  <br><br>

  9e : 

  <div class="div-e">

  <div class="div-cat-image">
     <img class="img-Oliver" src="Images/Oliver.png" alt="">
  </div>

  <input class="search-bar" type="text" placeholder="What's happening?">

  <button class="tweet-button">Tweet</button>

  </div>

  <br><br>

  9f : 
<br>

  <div class="div-f">

    <img class="profile-pic" src="Images/Oliver.png" alt="">
    <p class="profile-title">Oliver</p>
    <p class="mutual-friend">2 mutial frieads</p>
    <button class="add-friend">Add Friend</button>
  </div>

  
  <div class="div-f">

    <img class="profile-pic" src="Images/Mimi.png" alt="">
    <p class="profile-title">Mimi</p>
    <p class="mutual-friend">2 mutial frieads</p>
    <button class="add-friend">Add Friend</button>
  </div>

  <div class="div-f">

    <img class="profile-pic" src="Images/Rex.png" alt="">
    <p class="profile-title">Rex</p>
    <p class="mutual-friend">2 mutial frieads</p>
    <button class="add-friend">Add Friend</button>
  </div>


</body>
</html>
