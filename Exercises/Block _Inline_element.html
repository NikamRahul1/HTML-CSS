<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diplay block and inline block</title>
  <style>
    .buttons {
      display: block;
      margin: 10px;
    }
    .survey-box {
      border: 1px solid gray;
      width: 320px;
      padding: 10px;
    }

    .survey-text {
      display: inline-block;
      width: 220px;
      margin: 0;
      vertical-align: middle;
    }

    .button-container {
      display: inline-block;
      vertical-align: middle;
    }

    .google-image {
      width: 200px;
    }

    .google-search {
      border: 1px solid gray;
      width: 320px;
      padding: 10px;
    }

    .google-button {
      width: 300px;
      padding: 5px;
      border-radius: 15px;
      box-shadow: 1px 1px 5px grey ;
      border : 2px  gray;
      
    }

    .sign-up-button {
      width: 130px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid gray;

    }
    .sign-up {
      margin-top: 10px;
      background-color: blue;
      width: 282px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid gray;
      text-align: center;
      
    }
    .sign-up::placeholder {
      color: white;
      font-weight: bold;
    }

  </style>
</head>
<body>

  8a : 
  <input class="buttons" type="text" placeholder="Name">
  <input class="buttons" type="text" placeholder="Email">
  
  <br><br>
  8b : 

<div class="survey-box">
  <p class="survey-text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
  
  <Div  class="button-container">
  <button >Yes</button>
  <button >No</button>
  </Div>

</div>
<br><br>
 8c : 
  <Div class="google-search">
    
    <img class="google-image" src="Images/TextBox.html" alt="">
    <input class="google-button" type="text" placeholder="Search Google or type a URL">
    
  </Div>
   <br><br>
   
   8d : 
  <div class="google-search">

    <input class="sign-up-button" placeholder="First Name" type="text">
    <input class="sign-up-button" placeholder="Last Name" type="text">
    <input type="text"  class="sign-up" placeholder="Sign Up">
  </div>
</body>
</html>
