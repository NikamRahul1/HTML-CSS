<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diplay block and inline block</title>
  <style>
    .buttons {
      display: block;
      margin: 10px;
    }
    .survey-box {
      border: 1px solid gray;
      width: 320px;
      padding: 10px;
    }

    .survey-text {
      display: inline-block;
      width: 220px;
      margin: 0;
      vertical-align: middle;
    }

    .button-container {
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  8a : 
  <input class="buttons" type="text" placeholder="Name">
  <input class="buttons" type="text" placeholder="Email">
  
  <br><br>
  8b : 

<div class="survey-box">
  <p class="survey-text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
  
  <Div  class="button-container">
  <button >Yes</button>
  <button >No</button>
  </Div>
</div>
</body>
</html>
